services:
  # ─────────────────────────────────────────────────────────────────
  # PostgreSQL — audit log database
  # ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: algo_trading_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-algo_trading_broker}
      POSTGRES_USER: ${POSTGRES_USER:-algo_trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-algotrading_broker_db_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-algo_trading} -d ${POSTGRES_DB:-algo_trading_broker}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - trading_net

  # ─────────────────────────────────────────────────────────────────
  # NATS — message broker (broker <-> workers)
  # ─────────────────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: algo_trading_nats
    restart: always
    ports:
      - "${NATS_PORT:-4222}:${NATS_PORT:-4222}"                       # client connections (workers connect from outside)
      - "${NATS_MONITOR_PORT:-8222}:${NATS_MONITOR_PORT:-8222}"       # HTTP monitoring dashboard
    command: ["--port", "${NATS_PORT:-4222}", "--auth", "${NATS_TOKEN:-changeme}", "--http_port", "${NATS_MONITOR_PORT:-8222}"]
    networks:
      - trading_net

  # ─────────────────────────────────────────────────────────────────
  # BROKER — webhook server + NATS publisher + DB logging
  # ─────────────────────────────────────────────────────────────────
  broker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WEBHOOK_PORT: "${WEBHOOK_PORT:-8080}"
    develop:
      watch:
        - action: sync+restart
          path: ./broker
          target: /app/broker
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./uv.lock
    image: algo-trading-broker:latest
    container_name: algo_trading_broker
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    ports:
      - "${WEBHOOK_PORT:-8080}:${WEBHOOK_PORT:-8080}"      # TradingView webhook
    env_file:
      - .env
    environment:
      WEBHOOK_HOST: "0.0.0.0"
      WEBHOOK_PORT: "${WEBHOOK_PORT:-8080}"                # use unprivileged port for Windows compatibility
      NATS_HOST: "nats"   # Docker service name, overrides NATS_HOST=localhost from .env
      POSTGRES_HOST: postgres             # service name resolves via docker network
      POSTGRES_DB: ${POSTGRES_DB:-algo_trading_broker}
      POSTGRES_USER: ${POSTGRES_USER:-algo_trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-algotrading_broker_db_password}
    volumes:
      - .env:/app/.env
      - ./logs:/app/logs
    networks:
      - trading_net

volumes:
  postgres_data:

networks:
  trading_net:
    driver: bridge
