        "account_leverage": 100,
        "account_balance_init": 10000.00,
        "account_balance": 10000.00,
        "ticket": 123456789,
        "comment": "EA_v1 LONG XAUUSD",
        "magic": "20240101",
        "symbol": "OANDA:XAUUSD",
        "action": "LONG",
        "price": 2334.50,
        "quantity": 0.10,
        "sl": 2329.50,
        "tp1": 2340.00,
        "tp2": 2345.00,
        "is_running": true,
