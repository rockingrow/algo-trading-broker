info:
  name: Algo Trading Broker

docs:
  content: |-
    # Algo Trading Broker â€” Bruno Collection

    Bruno API collection at [bruno/](bruno/) for testing the Algo Trading Broker service. Three folders: **webhook** (signals from TradingView / strategy), **ADMIN** (broker admin operations), and **API** (read endpoints).

    ## Collection root

    [opencollection.yml](bruno/opencollection.yml) â€” collection manifest (`Algo Trading Broker`). Ignores `node_modules` and `.git`.

    ## Environments â€” [environments/](bruno/environments/)

    | Name | File |
    | --- | --- |
    | [Algo Trading Broker](bruno/environments/Algo%20Trading%20Broker.yml) | Single environment; all values pulled from `process.env.*` |

    Variables: `port`, `url` (`{{process.env.url}}:{{process.env.port}}/{{process.env.url_prefix}}`), `webhook_token`, `broker_token`, `api_key`.

    `url_prefix` maps to `BROKER_API_PREFIX` in the broker's `.env`. All request URLs are expressed as `{{url}}/v1/...` etc. â€” the prefix is baked into `{{url}}` so no individual request needs to be changed. Leave `url_prefix` empty (or omit it from `.env`) to use the default paths without a prefix.

    ---

    ## `webhook/` folder â€” TradingView â†’ Broker signals

    Folder config: [webhook/folder.yml](bruno/webhook/folder.yml) (auth inherited).
    All requests POST to `{{url}}/secret/webhook` with the same JSON envelope (prefix is already embedded in `{{url}}`):

    ```json
    {
      "strategy": "{{process.env.strategy}}",
      "token": "{{webhook_token}}",
      "symbol": "OANDA:{{process.env.symbol}}",
      "timeframe": "5",
      "timestamp": "YYYY-MM-DD HH:MM:SS",
      "position": { "action": "...", ... },
      "indicators": { ... },
      "inputs": { ... }
    }
    ```

    `indicators` and `inputs` are only present on entry/lifecycle signals â€” `FLAT` skips them.

    | Seq | Request | `position.action` | Payload shape |
    | --- | --- | --- | --- |
    | 1 | [Webhook - LONG](bruno/webhook/Webhook%20-%20LONG.yml) | `LONG` | full: `price`, `quantity`, `sl`, `tp1`, `tp2` |
    | 2 | [Webhook - SHORT](bruno/webhook/Webhook%20-%20SHORT.yml) | `SHORT` | full: `price`, `quantity`, `sl`, `tp1`, `tp2` |
    | 3 | [Webhook - TP1](bruno/webhook/Webhook%20-%20TP1.yml) | `TP1` | partial close: `price`, `quantity`, `is_running: true` |
    | 4 | [Webhook - TP2](bruno/webhook/Webhook%20-%20TP2.yml) | `TP2` | full close: `price`, `quantity`, `is_running: false` |
    | 5 | [Webhook - SL](bruno/webhook/Webhook%20-%20SL.yml) | `SL` | stop-loss: `price`, `quantity` |
    | 6 | [Webhook - R_SL](bruno/webhook/Webhook%20-%20R_SL.yml) | `R_SL` | trailing/raised SL: `price`, `quantity` |
    | 7 | [Webhook - FLAT](bruno/webhook/Webhook%20-%20FLAT.yml) | `FLAT` | minimal â€” only `action`, no `indicators` / `inputs` |

    `indicators` carries chart state (`wt1/wt2`, BB `upper/lower/basis`, `ema200_visual/filter`, `atr_val`, gating flags `in_session`, `vol_spike`, `in_cooldown`, `sl_too_wide`).
    `inputs` carries the strategy parameters (`watching_candles`, `over_wt_value`, `safe_wt_value`, `skip_windows`, `bb_*`, `atr_*`, `risk_percent`, `tp1_qty_pc`, `use_max_sl_dist`, `max_sl_distance`, `vol_*`, `ema_*_tf`, `use_cooldown`, `cooldown_bars`).

    ---

    ## `ADMIN/` folder â€” Broker admin operations

    Folder config: [ADMIN/folder.yml](bruno/ADMIN/folder.yml) â€” injects header `X-API-KEY: {{api_key}}` for every request.

    ### [FLAT](bruno/ADMIN/FLAT.yml) â€” `POST {{url}}/admin/flat` (prefix embedded in `{{url}}`)

    Force-flattens the broker state for a given strategy/symbol/account. Body: `strategy`, `symbol`, `account_id` (all from `process.env`).

    ### `ADMIN/Settings/` subfolder â€” broker setting toggles

    | Seq | Request | Endpoint |
    | --- | --- | --- |
    | 1 | [Toggle Include Signal Raw](bruno/ADMIN/Settings/Toggle%20Include%20Signal%20Raw.yml) | `POST {{url}}/admin/settings/include-signal-raw` |
    | 2 | [Toggle BlockSignal](bruno/ADMIN/Settings/Toggle%20BlockSignal.yml) | `POST {{url}}/admin/settings/block-signal` |
    | 2 | [Toggle SilentSignal](bruno/ADMIN/Settings/Toggle%20SilentSignal.yml) | `POST {{url}}/admin/settings/silent-signal` |

    All toggles: no body, auth inherited from `ADMIN/` folder (`X-API-KEY`).

    ---

    ## `API/` folder â€” Read endpoints

    Folder config: [API/folder.yml](bruno/API/folder.yml) â€” injects header `X-API-KEY: {{api_key}}` for every request.

    | Seq | Request | Method & Endpoint | Notes |
    | --- | --- | --- | --- |
    | 1 | [Health Check](bruno/API/Health%20Check.yml) | `GET {{url}}/v1/health` | Liveness probe, no body |
    | 3 | [accounts](bruno/API/accounts.yml) | `GET {{url}}/v1/accounts` | Returns list of registered accounts |
    | 3 | [trades](bruno/API/trades.yml) | `GET {{url}}/v1/{{account_id}}/trades` | Paginated trade list; query params: `offset` (default `0`), `limit` (optional, default `20`) |

    `trades` response shape: `{ data: Trade[], page: { total, limit, offset, order, order_by } }`.

    ---

    ## Auth summary

    | Surface | Auth mechanism |
    | --- | --- |
    | `POST /secret/webhook` | `token` field in JSON body (= `{{webhook_token}}`) |
    | `POST /admin/*` | `X-API-KEY` header (= `{{api_key}}`) injected by [ADMIN/folder.yml](bruno/ADMIN/folder.yml) |
    | `GET /v1/*` | `X-API-KEY` header (= `{{api_key}}`) injected by [API/folder.yml](bruno/API/folder.yml) |

    ## Typical test sequences

    - **Happy path long:** `webhook/LONG` â†’ `webhook/TP1` â†’ `webhook/TP2`.
    - **Stopped out:** `webhook/LONG` â†’ `webhook/SL`.
    - **Trail to BE / raise SL:** insert `webhook/R_SL` after `TP1`.
    - **Rejected entry:** `webhook/SHORT`.
    - **Reset state:** `webhook/FLAT` or `ADMIN/FLAT`.
    - **Check trades:** `API/trades` (paginate with `offset`).
  type: text/markdown
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
